<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Drainer Image Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(30, 30, 50, 0.95);
            border-radius: 20px;
            padding: 40px;
            border: 2px solid #ff1493;
        }

        h1 {
            margin-bottom: 30px;
            color: #ff1493;
            text-align: center;
        }

        .upload-section {
            background: rgba(255, 20, 147, 0.1);
            border: 2px dashed #ff1493;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-section:hover {
            background: rgba(255, 20, 147, 0.2);
        }

        .upload-section input {
            display: none;
        }

        .upload-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.4);
        }

        .images-section h2 {
            margin: 30px 0 20px;
            color: #ff69b4;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .image-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ff1493;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.3);
        }

        .image-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .image-card-footer {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .delete-btn {
            background: #ff1493;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            width: 100%;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff69b4;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            display: block;
        }

        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            display: block;
        }

        .loading {
            text-align: center;
            color: #ff69b4;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Auto-Drainer Image Manager</h1>

        <div id="status" class="status"></div>

        <div class="upload-section" onclick="document.getElementById('fileInput').click()">
            <input id="fileInput" type="file" accept="image/*" multiple onchange="handleFileSelect(event)">
            <p>Drag & drop images here or click to upload</p>
            <button class="upload-btn">Select Images</button>
        </div>

        <div class="images-section">
            <h2>Uploaded Images</h2>
            <div id="imagesList" class="loading">Loading images...</div>
        </div>
    </div>

    <script>
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            setTimeout(() => {
                statusEl.className = 'status';
            }, 3000);
        }

        function loadImages() {
            fetch('/api/images')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('imagesList');
                    
                    if (data.length === 0) {
                        container.innerHTML = '<p style="color: #aaa; grid-column: 1/-1; text-align: center;">No images uploaded yet</p>';
                        return;
                    }

                    container.innerHTML = data.map(img => `
                        <div class="image-card">
                            <img src="${img.url}" alt="image">
                            <div class="image-card-footer">
                                <button class="delete-btn" onclick="deleteImage('${img.filename}')">Delete</button>
                            </div>
                        </div>
                    `).join('');

                    // Convert to grid
                    const imagesList = document.getElementById('imagesList');
                    imagesList.className = 'images-grid';
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('imagesList').innerHTML = '<p style="color: #f44336;">Failed to load images</p>';
                });
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            let uploaded = 0;
            const total = files.length;

            for (let file of files) {
                const formData = new FormData();
                formData.append('image', file);

                fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(r => r.json())
                .then(data => {
                    uploaded++;
                    if (uploaded === total) {
                        showStatus(`✓ Uploaded ${total} image(s)`, 'success');
                        loadImages();
                        document.getElementById('fileInput').value = '';
                    }
                })
                .catch(err => {
                    showStatus(`✗ Failed to upload ${file.name}`, 'error');
                });
            }
        }

        function deleteImage(filename) {
            if (!confirm('Delete this image?')) return;

            fetch(`/api/delete/${filename}`, {
                method: 'DELETE'
            })
            .then(r => r.json())
            .then(() => {
                showStatus('✓ Image deleted', 'success');
                loadImages();
            })
            .catch(err => {
                showStatus('✗ Failed to delete image', 'error');
            });
        }

        // Load images on page load
        window.addEventListener('load', loadImages);

        // Drag & drop
        const uploadSection = document.querySelector('.upload-section');
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.style.background = 'rgba(255, 20, 147, 0.3)';
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.style.background = 'rgba(255, 20, 147, 0.1)';
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.style.background = 'rgba(255, 20, 147, 0.1)';
            
            const files = e.dataTransfer.files;
            document.getElementById('fileInput').files = files;
            handleFileSelect({ target: { files } });
        });
    </script>
</body>
</html>
